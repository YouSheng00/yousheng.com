<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cover — CompassStu Market Pricing Research</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    /* ── Rich gradient background ── */
    .bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 70% at 75% 15%, rgba(99,57,255,0.55) 0%, transparent 55%),
        radial-gradient(ellipse 60% 60% at 15% 75%, rgba(29,78,216,0.5) 0%, transparent 55%),
        radial-gradient(ellipse 50% 50% at 85% 80%, rgba(139,92,246,0.3) 0%, transparent 50%),
        radial-gradient(ellipse 40% 40% at 30% 20%, rgba(236,72,153,0.18) 0%, transparent 50%),
        #06060f;
    }

    /* ── Glowing orbs ── */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(1px);
      pointer-events: none;
    }

    .orb-1 {
      width: 52%;
      aspect-ratio: 1;
      top: -18%;
      right: -8%;
      background: radial-gradient(circle at 35% 35%,
        rgba(180,140,255,0.22) 0%,
        rgba(100,60,220,0.35) 35%,
        rgba(60,20,160,0.25) 60%,
        transparent 80%);
      box-shadow:
        inset 0 0 40px rgba(200,170,255,0.12),
        0 0 60px rgba(120,70,255,0.2);
    }

    .orb-2 {
      width: 38%;
      aspect-ratio: 1;
      bottom: -12%;
      left: -6%;
      background: radial-gradient(circle at 60% 40%,
        rgba(100,180,255,0.2) 0%,
        rgba(40,100,220,0.3) 40%,
        rgba(10,40,140,0.2) 65%,
        transparent 80%);
      box-shadow: 0 0 50px rgba(60,120,255,0.15);
    }

    .orb-3 {
      width: 22%;
      aspect-ratio: 1;
      top: 38%;
      left: 42%;
      background: radial-gradient(circle,
        rgba(220,180,255,0.15) 0%,
        rgba(160,100,255,0.08) 50%,
        transparent 75%);
      filter: blur(12px);
    }

    /* ── Subtle noise texture overlay ── */
    .noise {
      position: absolute;
      inset: 0;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px;
    }

    /* ── Glassmorphism card ── */
    .glass {
      position: absolute;
      inset: 9% 9%;
      border-radius: 12px;
      background: rgba(255,255,255,0.045);
      backdrop-filter: blur(28px) saturate(160%);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.1),
        inset 0 1px 0 rgba(255,255,255,0.15),
        0 20px 60px rgba(0,0,0,0.4);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 8% 9% 7%;
      overflow: hidden;
    }

    /* inner shine on glass card */
    .glass::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 50%;
      background: linear-gradient(180deg, rgba(255,255,255,0.045) 0%, transparent 100%);
      border-radius: 12px 12px 0 0;
      pointer-events: none;
    }

    /* ── Card top ── */
    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 1;
    }

    .brand {
      font-size: clamp(7px, 1.7vw, 10.5px);
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
    }

    .pill {
      font-size: clamp(6px, 1.2vw, 8px);
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(200,180,255,0.7);
      border: 1px solid rgba(180,150,255,0.25);
      background: rgba(120,80,255,0.12);
      padding: 2.5px 8px;
      border-radius: 999px;
    }

    /* ── Hero stat ── */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .eyebrow {
      font-size: clamp(6.5px, 1.4vw, 9px);
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(200,180,255,0.4);
      margin-bottom: 2%;
    }

    .big-num {
      font-size: clamp(46px, 13vw, 100px);
      font-weight: 200;
      letter-spacing: -0.04em;
      line-height: 0.88;
      background: linear-gradient(135deg, #fff 30%, rgba(180,150,255,0.9) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .rule {
      width: 100%;
      height: 1px;
      background: rgba(255,255,255,0.08);
      margin: 5% 0 4%;
    }

    .compare {
      display: flex;
      align-items: baseline;
      gap: 5%;
    }

    .compare-num {
      font-size: clamp(13px, 3.5vw, 26px);
      font-weight: 300;
      letter-spacing: -0.02em;
      color: rgba(255,255,255,0.5);
    }

    .compare-tag {
      font-size: clamp(6px, 1.3vw, 8.5px);
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.22);
    }

    /* ── Card bottom ── */
    .card-bottom {
      font-size: clamp(6px, 1.2vw, 8px);
      font-weight: 400;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.2);
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body>

  <!-- Background layers -->
  <div class="bg"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="noise"></div>

  <!-- Glassmorphism card -->
  <div class="glass">

    <div class="card-top">
      <span class="brand">CompassStu</span>
      <span class="pill">Research</span>
    </div>

    <div class="hero">
      <p class="eyebrow">Annual commitment discount</p>
      <p class="big-num">15%</p>
      <div class="rule"></div>
      <div class="compare">
        <span class="compare-num">44–52%</span>
        <span class="compare-tag">Industry median</span>
      </div>
    </div>

    <div class="card-bottom">7 platforms benchmarked · Market Pricing · May 2026</div>

  </div>

</body>
</html>
