<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" sizes="64x64" href="../CompassStufavicon (1).png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pipeline — CompassStu</title>
  <style>
    /* ─────────────────────────────────────────────────────────────────────
       PIPELINE — Learn → Simulate → Prove
       Editorial diagram designed to match the parent page's voice:
       same Inter family, same restrained palette, same `text-shadow`
       halo trick used by .wordmark / .tagline. No purple atmospherics,
       no "showcase panel" framing — just three verbs, three numbers,
       two hairlines, and a single white pulse traveling between them.
       ───────────────────────────────────────────────────────────────────── */

    :root {
      --bg:             #0b1215;            /* matches site --c-background */
      --text:           #ffffff;            /* matches site --c-text */
      --text-muted:     #9b9b9b;            /* matches site --c-text-muted */
      --hairline:       rgba(255, 255, 255, 0.16);
    }

    * { box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      font-feature-settings: "ss09", "cv11";
      margin: 0;
      overflow: hidden;
      height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 32px;
    }

    /* ── Pipeline: three steps + two connectors, evenly distributed ─── */
    .pipeline {
      display: grid;
      grid-template-columns: 1fr auto 1fr auto 1fr;
      align-items: center;
      width: 100%;
      max-width: 720px;
      animation: fade-in 1.1s ease-out both;
    }
    @keyframes fade-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      animation: rise 1.1s cubic-bezier(0.2, 0, 0, 1) both;
    }
    .step:nth-child(1) { animation-delay: 0.10s; }
    .step:nth-child(3) { animation-delay: 0.30s; }
    .step:nth-child(5) { animation-delay: 0.50s; }
    @keyframes rise {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Number label — echoes the page's small uppercase tracked labels
       (dock links, case-study pill). 11px, 550 weight, 0.06em ls. */
    .step-num {
      font-size: 11px;
      font-weight: 550;
      letter-spacing: 0.22em;
      color: var(--text-muted);
      text-transform: uppercase;
      font-variant-numeric: tabular-nums;
      transition: color 0.4s ease;
    }

    /* Verb — same scale as the editorial lead in .project-text. Subtle
       text-shadow halo matches .wordmark / .tagline. */
    .step-verb {
      font-size: clamp(1.85rem, 4.4vw, 2.85rem);
      font-weight: 400;
      letter-spacing: -0.022em;
      line-height: 1;
      color: var(--text);
      text-shadow: 0 0 0.4px currentColor;
    }

    /* ── Coordinated step "moments" ──────────────────────────────────
       Each step has its own beat in the 5.5s cycle:
         • s1 (Learn)    — t=0s     pulse departs from here
         • s2 (Simulate) — t=1.5s   pulse arrives, passes through
         • s3 (Prove)    — t=3.2s   pulse arrives, terminates
       At its beat, the step's number AND verb light up together. */

    .step.s1 .step-num,
    .step.s1 .step-verb { animation: step-flash 5.5s ease-in-out infinite; }
    .step.s2 .step-num,
    .step.s2 .step-verb { animation: step-flash 5.5s ease-in-out infinite; animation-delay: 1.5s; }
    .step.s3 .step-num,
    .step.s3 .step-verb { animation: step-flash 5.5s ease-in-out infinite; animation-delay: 3.2s; }

    /* The number swaps color (muted → text); the verb adds a soft halo
       bloom on top of its always-on sub-pixel halo. Both share the same
       short flash window so they peak together. */
    .step-num { animation-fill-mode: both; }
    .step-verb { animation-fill-mode: both; }

    @keyframes step-flash {
      0%       { /* base state — set per element below */ }
      3%       { /* peak — set per element below */ }
      18%      { /* settle — set per element below */ }
      100%     { /* idle */ }
    }
    /* num: color shift */
    .step-num {
      animation-name: num-flash;
    }
    @keyframes num-flash {
      0%       { color: var(--text-muted); text-shadow: none; }
      3%       { color: var(--text); text-shadow: 0 0 10px rgba(255, 255, 255, 0.4); }
      18%      { color: var(--text-muted); text-shadow: none; }
      100%     { color: var(--text-muted); text-shadow: none; }
    }
    /* verb: halo bloom on top of base sub-pixel halo */
    .step-verb {
      animation-name: verb-flash;
    }
    @keyframes verb-flash {
      0%       { text-shadow: 0 0 0.4px currentColor; }
      3%       { text-shadow: 0 0 0.4px currentColor,
                              0 0 24px rgba(255, 255, 255, 0.55); }
      22%      { text-shadow: 0 0 0.4px currentColor; }
      100%     { text-shadow: 0 0 0.4px currentColor; }
    }

    /* ── Connector: hairline + travelling pulse ──────────────────────── */
    .connector {
      position: relative;
      width: clamp(48px, 8vw, 96px);
      height: 1px;
      align-self: center;
      background: var(--hairline);
      opacity: 0;
    }
    /* Two animations layered on the wire: an opacity reveal on load,
       then an infinite "warm" pulse that brightens the hairline while
       the travelling pulse is passing over it. */
    .connector.c1 {
      animation:
        connector-in 0.9s ease-out 0.7s both,
        wire-warm 5.5s ease-in-out 0s infinite;
    }
    .connector.c2 {
      animation:
        connector-in 0.9s ease-out 0.7s both,
        wire-warm 5.5s ease-in-out 1.7s infinite;
    }
    @keyframes connector-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes wire-warm {
      0%, 3%    { background: rgba(255, 255, 255, 0.16); }
      10%, 22%  { background: rgba(255, 255, 255, 0.32); }
      28%, 100% { background: rgba(255, 255, 255, 0.16); }
    }

    /* Pulse — wider with an extended fading tail. The bright head leads,
       the trailing gradient gives the impression of motion blur. */
    .connector::after {
      content: '';
      position: absolute;
      top: -2px;
      left: 0;
      width: 40px;
      height: 5px;
      border-radius: 4px;
      background: linear-gradient(to right,
        transparent 0%,
        rgba(255, 255, 255, 0.08) 25%,
        rgba(255, 255, 255, 0.35) 55%,
        rgba(255, 255, 255, 0.85) 85%,
        rgba(255, 255, 255, 1) 100%);
      box-shadow: 0 0 12px rgba(255, 255, 255, 0.5);
      animation: travel 5.5s ease-in-out infinite;
    }
    .connector.c1::after { animation-delay: 0s; }
    .connector.c2::after { animation-delay: 1.7s; }
    @keyframes travel {
      0%   { transform: translateX(-40px); opacity: 0; }
      4%   { opacity: 0.4; }
      10%  { opacity: 1; }
      20%  { opacity: 1; }
      26%  { transform: translateX(110px); opacity: 0; }
      100% { transform: translateX(110px); opacity: 0; }
    }

    /* ── Narrow: stack vertically ─────────────────────────────────── */
    @media (max-width: 520px) {
      .stage { height: auto; min-height: 100vh; padding: 60px 24px; }
      body { overflow: auto; height: auto; }
      .pipeline {
        grid-template-columns: 1fr;
      }
      .connector {
        width: 1px;
        height: clamp(48px, 6vw, 64px);
        margin: 0 auto;
      }
      .connector::after {
        top: 0;
        left: -2px;
        width: 5px;
        height: 40px;
        background: linear-gradient(to bottom,
          transparent 0%,
          rgba(255, 255, 255, 0.08) 25%,
          rgba(255, 255, 255, 0.35) 55%,
          rgba(255, 255, 255, 0.85) 85%,
          rgba(255, 255, 255, 1) 100%);
        animation: travel-v 5.5s ease-in-out infinite;
      }
      .connector.c2::after { animation-delay: 1.7s; }
      @keyframes travel-v {
        0%   { transform: translateY(-40px); opacity: 0; }
        4%   { opacity: 0.4; }
        10%  { opacity: 1; }
        20%  { opacity: 1; }
        26%  { transform: translateY(72px); opacity: 0; }
        100% { transform: translateY(72px); opacity: 0; }
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .step,
      .step-num,
      .step-verb,
      .connector,
      .connector::after,
      .pipeline { animation: none !important; }
      .connector { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="pipeline">
      <div class="step s1">
        <div class="step-num">01</div>
        <div class="step-verb">Learn</div>
      </div>

      <div class="connector c1"></div>

      <div class="step s2">
        <div class="step-num">02</div>
        <div class="step-verb">Simulate</div>
      </div>

      <div class="connector c2"></div>

      <div class="step s3">
        <div class="step-num">03</div>
        <div class="step-verb">Prove</div>
      </div>
    </div>
  </div>
</body>
</html>
