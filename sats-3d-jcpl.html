<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SATS JCPL Front Right — 3D Model</title>

    <!-- Google's <model-viewer> web component: renders glTF/GLB with
         orbit controls, auto-rotate, IBL lighting — no Three.js boilerplate. -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>

    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: transparent;
      }

      model-viewer {
        width: 100%;
        height: 100%;
        background-color: transparent;
        --poster-color: transparent;
      }
    </style>
  </head>
  <body>
    <model-viewer
      src="GLB/JCPL_FrontRight.glb"
      alt="SATS JCPL Front Right 3D Model"
      camera-controls
      auto-rotate
      auto-rotate-delay="500"
      rotation-per-second="20deg"
      exposure="1.0"
      shadow-intensity="0.6"
      shadow-softness="0.8"
      interaction-prompt="none"
      loading="eager">
    </model-viewer>
  </body>
</html>
